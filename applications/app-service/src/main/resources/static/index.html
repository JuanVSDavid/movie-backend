<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie API Frontend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #111827; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .backdrop-img {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60vh;
            width: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .backdrop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60vh;
            width: 100%;
            background: linear-gradient(to top, #111827 10%, rgba(17, 24, 39, 0.6) 100%);
            z-index: 2;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        const AuthContext = createContext(null);

        const AuthProvider = ({ children }) => {
            const [token, setToken] = useState(() => localStorage.getItem('accessToken'));

            useEffect(() => {
                if (token) {
                    localStorage.setItem('accessToken', token);
                } else {
                    localStorage.removeItem('accessToken');
                }
            }, [token]);

            const logout = () => setToken(null);
            const value = { token, setToken, logout };
            return <AuthContext.Provider value={value}>{children}</AuthContext.Provider>;
        };

        const useAuth = () => useContext(AuthContext);

        const apiService = {
            BASE_URL: 'http://localhost:8080',
            async request(endpoint, options = {}) {
                const url = `${this.BASE_URL}${endpoint}`;
                const headers = { 'Content-Type': 'application/json', ...options.headers };
                const token = localStorage.getItem('accessToken');
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const response = await fetch(url, { ...options, headers });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ message: 'Error de red o respuesta no válida.' }));
                    throw new Error(errorData.message || `Error ${response.status}`);
                }
                if (response.status === 204) return null;
                return response.json();
            },

            register: (email, password) => apiService.request('/api/auth/register', { method: 'POST', body: JSON.stringify({ email, password }) }),
            login: (email, password) => apiService.request('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) }),

            getPopularMovies: (page = 0, size = 12) => apiService.request(`/api/v1/movies/popular?page=${page}&size=${size}`),
            
            getMovieById: (id) => apiService.request(`/api/v1/movies/${id}`),
            createMovie: (movieData) => apiService.request('/api/v1/movies', { method: 'POST', body: JSON.stringify(movieData) }),
            updateMovie: (id, movieData) => apiService.request(`/api/v1/movies/${id}`, { method: 'PUT', body: JSON.stringify(movieData) }),
            deleteMovie: (id) => apiService.request(`/api/v1/movies/${id}`, { method: 'DELETE' }),
        };

        function App() {
            const { token } = useAuth();
            return token ? <MainApp /> : <AuthPage />;
        }
            
        function AuthPage() {
            const [isLogin, setIsLogin] = useState(true);
            return (
                 <div className="min-h-screen flex items-center justify-center bg-gray-900 p-4">
                    {isLogin ? <LoginForm switchToRegister={() => setIsLogin(false)} /> : <RegisterForm switchToLogin={() => setIsLogin(true)} />}
                </div>
            );
        }
        function AuthFormWrapper({ title, children, footerContent }) {
             return (
                <div className="w-full max-w-md p-8 space-y-6 bg-gray-800 rounded-lg shadow-2xl">
                    <h2 className="text-3xl font-bold text-center text-white">{title}</h2>
                    {children}
                    <p className="text-sm text-center text-gray-400">{footerContent}</p>
                </div>
            );
        }
       function FormInput({ type, value, onChange, placeholder }) { return <input type={type} value={value} onChange={onChange} placeholder={placeholder} required className="w-full px-4 py-3 text-white bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" />; }
       function LoginForm({switchToRegister}) {
            const { setToken } = useAuth();
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                setError(''); setIsLoading(true);
                try {
                    const data = await apiService.login(email, password);
                    setToken(data.accessToken);
                } catch(err) {
                    setError(err.message || "Error al iniciar sesión.");
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <AuthFormWrapper title="Iniciar Sesión" footerContent={<>¿No tienes cuenta? <button onClick={switchToRegister} className="font-semibold text-indigo-400 hover:underline">Regístrate</button></>}>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <FormInput type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" />
                        <FormInput type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Contraseña" />
                        {error && <p className="text-red-400 text-sm text-center">{error}</p>}
                        <button type="submit" disabled={isLoading} className="w-full px-4 py-3 font-bold text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50 transition-colors">
                           {isLoading ? 'Ingresando...' : 'Login'}
                        </button>
                    </form>
                </AuthFormWrapper>
            );
        }
        function RegisterForm({switchToLogin}) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            
            const handleSubmit = async (e) => {
                e.preventDefault();
                setError(''); setSuccess(''); setIsLoading(true);
                try {
                    await apiService.register(email, password);
                    setSuccess('¡Registro exitoso! Redirigiendo a login...');
                    setTimeout(switchToLogin, 2000);
                } catch(err) {
                    setError(err.message || "Error en el registro.");
                } finally {
                    setIsLoading(false);
                }
            };
            
            return (
                 <AuthFormWrapper title="Crear Cuenta" footerContent={<>¿Ya tienes cuenta? <button onClick={switchToLogin} className="font-semibold text-indigo-400 hover:underline">Inicia Sesión</button></>}>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <FormInput type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Email" />
                        <FormInput type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Contraseña" />
                        {error && <p className="text-red-400 text-sm text-center">{error}</p>}
                        {success && <p className="text-green-400 text-sm text-center">{success}</p>}
                        <button type="submit" disabled={isLoading} className="w-full px-4 py-3 font-bold text-white bg-indigo-600 rounded-md hover:bg-indigo-700 disabled:opacity-50 transition-colors">
                             {isLoading ? 'Registrando...' : 'Registrarse'}
                        </button>
                    </form>
                </AuthFormWrapper>
            );
        }

        function MainApp() {
            const [view, setView] = useState({ name: 'list' });
            const navigate = (name, props = {}) => setView({ name, ...props });

            const renderView = () => {
                switch(view.name) {
                    case 'detail': return <MovieDetailPage movieId={view.movieId} onNavigate={navigate} />;
                    case 'form': return <MovieFormPage movieId={view.movieId} onNavigate={navigate} />;
                    default: return <MovieListPage onNavigate={navigate} />;
                }
            };
            return <div className="w-full min-h-screen bg-gray-900 text-white">{renderView()}</div>;
        }

        function MovieListPage({ onNavigate }) {
            const { logout } = useAuth();
            const [movies, setMovies] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                apiService.getPopularMovies()
                    .then(data => setMovies(data.content))
                    .catch(err => (err.message.includes("401") || err.message.includes("403")) && logout())
                    .finally(() => setIsLoading(false));
            }, []);

            return (
                 <>
                    <header className="sticky top-0 z-20 p-4 bg-gray-800/80 backdrop-blur-sm shadow-md flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-white cursor-pointer" onClick={() => onNavigate('list')}>MovieApp</h1>
                        <div>
                             <button onClick={() => onNavigate('form')} className="mr-4 px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-colors">Añadir Película</button>
                             <button onClick={logout} className="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors">Cerrar Sesión</button>
                        </div>
                    </header>
                    <main className="p-4 md:p-8">
                        <h2 className="text-3xl font-bold mb-6">Películas Populares</h2>
                        {isLoading ? <div className="flex justify-center mt-8"><div className="loader"></div></div> : (
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                                {movies.map(movie => <MovieCard key={movie.id} movie={movie} onCardClick={() => onNavigate('detail', { movieId: movie.id })} />)}
                            </div>
                        )}
                    </main>
                </>
            );
        }
        
        function MovieDetailPage({ movieId, onNavigate }) {
            const [movie, setMovie] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const IMG_BASE_URL = 'https://image.tmdb.org/t/p/';

            useEffect(() => {
                apiService.getMovieById(movieId)
                    .then(setMovie)
                    .finally(() => setIsLoading(false));
            }, [movieId]);

            const handleDelete = async () => {
                if (window.confirm('¿Estás seguro de que quieres eliminar esta película?')) {
                     try {
                        await apiService.deleteMovie(movieId);
                        alert('Película eliminada con éxito.');
                        onNavigate('list');
                     } catch (error) {
                        alert('Error al eliminar: ' + error.message);
                     }
                }
            };
            
            const formatCurrency = (amount) => amount ? `$${amount.toLocaleString()}` : 'No disponible';
            const formatRuntime = (minutes) => minutes ? `${Math.floor(minutes/60)}h ${minutes%60}m` : 'N/A';

            if (isLoading) return <div className="flex justify-center items-center h-screen"><div className="loader"></div></div>;
            if (!movie) return <div className="p-8 text-center">Película no encontrada. <button onClick={() => onNavigate('list')} className="text-indigo-400 hover:underline">Volver</button></div>;

            return (
                <div className="relative">
                    <img src={movie.backdrop_path ? `${IMG_BASE_URL}original${movie.backdrop_path}` : ''} className="backdrop-img opacity-30" />
                    <div className="backdrop-overlay"></div>
                    
                    <div className="relative z-10 p-4 md:p-8">
                        <button onClick={() => onNavigate('list')} className="mb-8 text-white hover:text-indigo-300 transition-colors">{'< Volver a la lista'}</button>
                    
                        <div className="flex flex-col md:flex-row gap-8">
                            <div className="md:w-1/3 flex-shrink-0">
                                <img src={movie.poster_path ? `${IMG_BASE_URL}w500${movie.poster_path}` : `https://placehold.co/500x750/1f2937/ffffff?text=${movie.title.replace(/\s/g, '+')}`} className="rounded-lg shadow-2xl w-full" />
                            </div>
                            <div className="md:w-2/3 text-white">
                                <h1 className="text-4xl md:text-5xl font-bold">{movie.title} <span className="text-3xl text-gray-400 font-light">({new Date(movie.release_date).getFullYear()})</span></h1>
                                {movie.tagline && <p className="text-xl text-gray-300 italic mt-2">"{movie.tagline}"</p>}
                                <div className="flex items-center gap-4 my-4 flex-wrap">
                                    <span className="text-2xl font-bold text-yellow-400">{movie.vote_average?.toFixed(1)} ★</span>
                                    <span className="text-gray-400">({movie.vote_count} votos)</span>
                                    <span className="text-gray-400">|</span>
                                    <span className="text-gray-400">{formatRuntime(movie.runtime)}</span>
                                </div>
                                <div className="flex flex-wrap gap-2 my-4">
                                    {movie.genres?.map(genre => <span key={genre.id} className="bg-gray-700 px-3 py-1 rounded-full text-sm">{genre.name}</span>)}
                                </div>
                                <h2 className="text-2xl font-semibold mt-6 mb-2">Resumen</h2>
                                <p className="text-gray-300 leading-relaxed">{movie.overview}</p>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6 text-sm">
                                    <div><strong className="block text-gray-400">Estado</strong> {movie.status}</div>
                                    <div><strong className="block text-gray-400">Lenguaje Original</strong> {movie.original_language?.toUpperCase()}</div>
                                    <div><strong className="block text-gray-400">Presupuesto</strong> {formatCurrency(movie.budget)}</div>
                                    <div><strong className="block text-gray-400">Recaudación</strong> {formatCurrency(movie.revenue)}</div>
                                </div>
                                
                                <div className="mt-8 space-x-4">
                                    <button onClick={() => onNavigate('form', { movieId: movie.id })} className="px-6 py-2 bg-blue-600 rounded-md hover:bg-blue-700 transition">Editar</button>
                                    <button onClick={handleDelete} className="px-6 py-2 bg-red-600 rounded-md hover:bg-red-700 transition">Eliminar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        function MovieFormPage({ movieId, onNavigate }) {
            const [formData, setFormData] = useState({ title: '', overview: '', releaseDate: '' });
            const isEditing = movieId != null;

            useEffect(() => {
                if (isEditing) {
                    apiService.getMovieById(movieId).then(data => setFormData({
                        title: data.title,
                        overview: data.overview,
                        releaseDate: data.releaseDate
                    }));
                }
            }, [movieId]);

            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const action = isEditing ? apiService.updateMovie(movieId, formData) : apiService.createMovie(formData);
                    const savedMovie = await action;
                    alert(`Película ${isEditing ? 'actualizada' : 'creada'} con éxito.`);
                    onNavigate('detail', { movieId: isEditing ? movieId : savedMovie.id });
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            };

            return (
                 <div className="p-8 max-w-2xl mx-auto">
                    <button onClick={() => onNavigate(isEditing ? 'detail' : 'list', { movieId: movieId })} className="mb-8 text-indigo-400 hover:underline">{'< Cancelar'}</button>
                    <form onSubmit={handleSubmit} className="space-y-6 bg-gray-800 p-8 rounded-lg">
                        <h2 className="text-2xl font-bold">{isEditing ? 'Editar Película' : 'Crear Nueva Película'}</h2>
                        <div>
                            <label className="block mb-2">Título</label>
                            <input name="title" value={formData.title} onChange={handleChange} className="w-full p-2 bg-gray-700 rounded"/>
                        </div>
                         <div>
                            <label className="block mb-2">Resumen (Overview)</label>
                            <textarea name="overview" value={formData.overview} onChange={handleChange} rows="5" className="w-full p-2 bg-gray-700 rounded"></textarea>
                        </div>
                         <div>
                            <label className="block mb-2">Fecha de Lanzamiento</label>
                            <input type="date" name="releaseDate" value={formData.releaseDate} onChange={handleChange} className="w-full p-2 bg-gray-700 rounded"/>
                        </div>
                        <button type="submit" className="w-full py-3 bg-indigo-600 rounded-md hover:bg-indigo-700">{isEditing ? 'Guardar Cambios' : 'Crear Película'}</button>
                    </form>
                </div>
            );
        }

        function MovieCard({ movie, onCardClick }) {
             const IMG_BASE_URL = 'https://image.tmdb.org/t/p/w500';
            const posterUrl = movie.poster_path ? `${IMG_BASE_URL}${movie.poster_path}` : `https://placehold.co/500x750/1f2937/ffffff?text=${movie.title.replace(/\s/g, '+')}`;
            
            return (
                <div onClick={onCardClick} className="bg-gray-800 rounded-lg overflow-hidden shadow-lg transform hover:scale-105 transition-transform duration-300 group cursor-pointer">
                    <img src={posterUrl} alt={movie.title} className="w-full h-auto object-cover"/>
                    <div className="p-3">
                        <h3 className="text-base font-semibold truncate group-hover:text-indigo-400 transition-colors">{movie.title}</h3>
                        <div className="flex justify-between items-center mt-1">
                            <p className="text-sm text-gray-400">{movie.release_date ? new Date(movie.release_date).getFullYear() : 'N/A'}</p>
                            {movie.vote_average != null && <span className="text-sm font-bold text-yellow-400">{movie.vote_average.toFixed(1)} ★</span>}
                        </div>
                    </div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuthProvider><App /></AuthProvider>);
    </script>
</body>
</html>
