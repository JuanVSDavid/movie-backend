server:
  port: 8080
spring:
  application:
    name: "movieService"
  devtools:
    add-properties: false
  datasource:
    url: jdbc:postgresql://localhost:5432/
    username: postgres
    password: marviniscool
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
management:
  endpoints:
    web:
      exposure:
        include: "health"
  endpoint:
    health:
      probes:
        enabled: true
jwt:
  json-exp-roles: "/roles"
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
